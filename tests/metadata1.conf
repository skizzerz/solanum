serverinfo {
	sid = "0AA";
	name = "me.test";
	description = "Test server";
	network_name = "Test network";
};

connect "remote.test" {
	host = "::1";
	fingerprint = "test";
	class = "default";
};

connect "remote2.test" {
	host = "::1";
	fingerprint = "test";
	class = "default";
};

connect "remote3.test" {
	host = "::1";
	fingerprint = "test";
	class = "default";
};

privset "admin" {
	privs = oper:admin;
};

privset "auspex" {
    privs = oper:general, oper:spy, oper:override, auspex:metadata, snomask:metadata;
};

class "lowq" {
    sendq = 8 kbytes;
};

/* not used by default, fake clients normally have no attached iline
 * needed for init_large_metadata to test async production */
auth {
    user = "*@*";
    class = "lowq";
};

metadata {
    enable_client_command = yes;
    max_subs = 5;
    max_keys = 5;
    max_value_bytes = 60;
    deny_keys = "denied-*";
};
